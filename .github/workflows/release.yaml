name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          archive="dist/ucr-tools-${VERSION}.tar.gz"
          tar -czf "${archive}" ucr jmq murdoc worldbuilder ulcer-core.zsh
          echo "Created ${archive}"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
